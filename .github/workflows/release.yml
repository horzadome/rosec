name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Determine version and whether to skip (commit already tagged for release)
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
      is_release: ${{ steps.version.outputs.is_release }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      should_skip: ${{ steps.version.outputs.should_skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          SHOULD_SKIP=false
          IS_PRERELEASE=false

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push — stable release or pre-release
            VERSION="${GITHUB_REF_NAME#v}"
            VERSION_TAG="${GITHUB_REF_NAME}"

            # Pre-release if version contains a pre-release suffix
            # e.g. v0.1.0-alpha.1, v0.1.0-rc.1, v0.1.0-beta
            if [[ "$VERSION" =~ -[a-zA-Z] ]]; then
              IS_RELEASE=false
              IS_PRERELEASE=true
            else
              IS_RELEASE=true
              IS_PRERELEASE=false
            fi

          else
            IS_RELEASE=false

            # On main: skip if this commit already carries a stable release tag
            # (avoids double-building when the release commit lands on main)
            if [[ "${{ github.ref }}" == refs/heads/main ]]; then
              EXISTING_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
              if [[ -n "$EXISTING_TAG" ]]; then
                echo "Commit already has release tag ${EXISTING_TAG} — skipping snapshot build"
                SHOULD_SKIP=true
              fi
            fi

            # Snapshot version derived from git history:
            #   version     = {major}.{minor}.{next_patch}-dev.{commits}+{hash}
            #   version_tag = v{major}.{minor}.{next_patch}-dev.{commits}
            #
            # The '+hash' suffix is valid semver build metadata and used in
            # artifact names, but omitted from the git tag because GitHub does
            # not allow '+' in tag names.
            if git describe --tags --always --long 2>/dev/null | grep -q '^v'; then
              DESCRIBE=$(git describe --tags --always --long 2>/dev/null)
              if [[ $DESCRIBE =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)-([0-9]+)-g([a-f0-9]+)$ ]]; then
                MAJOR=${BASH_REMATCH[1]}
                MINOR=${BASH_REMATCH[2]}
                PATCH=${BASH_REMATCH[3]}
                COMMITS=${BASH_REMATCH[4]}
                HASH=${BASH_REMATCH[5]}
                NEXT_PATCH=$((PATCH + 1))
                VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-dev.${COMMITS}+${HASH}"
                VERSION_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}-dev.${COMMITS}"
              else
                VERSION="0.0.0-dev.0+${GITHUB_SHA:0:7}"
                VERSION_TAG="v0.0.0-dev.0"
              fi
            else
              VERSION="0.0.0-dev.0+${GITHUB_SHA:0:7}"
              VERSION_TAG="v0.0.0-dev.0"
            fi
          fi

          echo "should_skip=${SHOULD_SKIP}"     >> "$GITHUB_OUTPUT"
          echo "is_release=${IS_RELEASE}"       >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"             >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}"     >> "$GITHUB_OUTPUT"

          echo "Version:       ${VERSION}"
          echo "Version tag:   ${VERSION_TAG}"
          echo "Is release:    ${IS_RELEASE}"
          echo "Is prerelease: ${IS_PRERELEASE}"
          echo "Should skip:   ${SHOULD_SKIP}"

  # ---------------------------------------------------------------------------
  # CI gate — test, clippy, fmt must pass before any build or release job
  # ---------------------------------------------------------------------------
  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_skip != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace --locked

      - name: Clippy (warnings as errors)
        run: cargo clippy --workspace --locked -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Build binaries for all target platforms
  #
  # Targets: Linux only — rosec requires D-Bus, which is Linux-specific.
  #   x86_64-unknown-linux-gnu   — standard desktops / servers  (native)
  #   aarch64-unknown-linux-gnu  — Raspberry Pi, ARM servers    (cross)
  #   x86_64-unknown-linux-musl  — static binary                (cross)
  #   aarch64-unknown-linux-musl — ARM static binary            (cross)
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [prepare, ci]
    if: needs.prepare.outputs.should_skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false

          - target: aarch64-unknown-linux-gnu
            cross: true

          - target: x86_64-unknown-linux-musl
            cross: true

          - target: aarch64-unknown-linux-musl
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        if: matrix.cross == false
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev \
            libpam0g-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.cross == false
        run: |
          cargo build --release --locked \
            --bin rosecd --bin rosec --bin rosec-prompt --bin rosec-pam-unlock \
            --target ${{ matrix.target }}

      - name: Build PAM module (native only)
        if: matrix.cross == false
        run: make -C contrib/pam pam_rosec.so

      - name: Build (cross)
        if: matrix.cross == true
        run: |
          cross build --release --locked \
            --bin rosecd --bin rosec --bin rosec-prompt --bin rosec-pam-unlock \
            --target ${{ matrix.target }}

      - name: Package artifacts
        run: |
          TARGET=${{ matrix.target }}
          VERSION=${{ needs.prepare.outputs.version }}
          STAGE="dist/${TARGET}"
          mkdir -p "${STAGE}"

          cp "target/${TARGET}/release/rosecd" "${STAGE}/"
          cp "target/${TARGET}/release/rosec"  "${STAGE}/"
          cp "target/${TARGET}/release/rosec-prompt" "${STAGE}/"
          cp "target/${TARGET}/release/rosec-pam-unlock" "${STAGE}/"
          cp -r contrib "${STAGE}/"
          cp README.md  "${STAGE}/" 2>/dev/null || true
          cp LICENSE     "${STAGE}/" 2>/dev/null || true

          # PAM module is only built for native targets (needs libpam-dev)
          if [[ -f contrib/pam/pam_rosec.so ]]; then
            cp contrib/pam/pam_rosec.so "${STAGE}/"
          fi

          ARCHIVE="rosec-${VERSION}-${TARGET}.tar.gz"
          tar -czf "${ARCHIVE}" -C "dist" "${TARGET}"
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rosec-${{ matrix.target }}
          retention-days: 1
          path: |
            rosec-*.tar.gz
            rosec-*.tar.gz.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build WASM providers
  #
  # WASM providers are architecture-independent — one .wasm file works on all
  # platforms.  Each provider guest crate is built separately since they are
  # excluded from the workspace (they target wasm32-wasip1).
  #
  # Providers are packaged as individual tarballs named:
  #   rosec-provider-{kind}-{version}.wasm.tar.gz
  # Each tarball contains the .wasm file ready to be placed in
  # /usr/lib/rosec/providers/ or ~/.local/share/rosec/providers/
  # ---------------------------------------------------------------------------
  build-wasm:
    name: Build WASM Providers
    runs-on: ubuntu-latest
    needs: [prepare, ci]
    if: needs.prepare.outputs.should_skip != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm-providers
          workspaces: |
            rosec-bitwarden-pm
            rosec-bitwarden-sm
            rosec-gnome-keyring

      - name: Build bitwarden-pm provider
        working-directory: rosec-bitwarden-pm
        run: cargo build --target wasm32-wasip1 --release

      - name: Build bitwarden-sm provider
        working-directory: rosec-bitwarden-sm
        run: cargo build --target wasm32-wasip1 --release

      - name: Build gnome-keyring provider
        working-directory: rosec-gnome-keyring
        run: cargo build --target wasm32-wasip1 --release

      - name: Copy WASM providers
        run: |
          mkdir -p dist/providers

          # bitwarden-pm
          cp rosec-bitwarden-pm/target/wasm32-wasip1/release/rosec_bitwarden_pm.wasm \
             dist/providers/rosec_bitwarden_pm.wasm

          # bitwarden-sm
          cp rosec-bitwarden-sm/target/wasm32-wasip1/release/rosec_bitwarden_sm.wasm \
             dist/providers/rosec_bitwarden_sm.wasm

          # gnome-keyring
          cp rosec-gnome-keyring/target/wasm32-wasip1/release/rosec_gnome_keyring.wasm \
             dist/providers/rosec_gnome_keyring.wasm

      - name: Sign WASM providers
        env:
          WASM_SIGNING_KEY: ${{ secrets.WASM_SIGNING_KEY }}
        run: |
          cargo install rsign2 --quiet 2>/dev/null || true
          # Write the private key from secret to a temp file
          KEYFILE=$(mktemp)
          echo "${WASM_SIGNING_KEY}" > "${KEYFILE}"
          trap 'rm -f "${KEYFILE}"' EXIT

          for wasm in dist/providers/*.wasm; do
            rsign sign -s "${KEYFILE}" -W "${wasm}"
            echo "Signed: ${wasm}"
          done

      - name: Package signed WASM providers
        run: |
          VERSION=${{ needs.prepare.outputs.version }}

          # bitwarden-pm
          ARCHIVE="rosec-provider-bitwarden-pm-${VERSION}.wasm.tar.gz"
          tar -czf "${ARCHIVE}" -C dist/providers rosec_bitwarden_pm.wasm rosec_bitwarden_pm.wasm.minisig
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

          # bitwarden-sm
          ARCHIVE="rosec-provider-bitwarden-sm-${VERSION}.wasm.tar.gz"
          tar -czf "${ARCHIVE}" -C dist/providers rosec_bitwarden_sm.wasm rosec_bitwarden_sm.wasm.minisig
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

          # gnome-keyring
          ARCHIVE="rosec-provider-gnome-keyring-${VERSION}.wasm.tar.gz"
          tar -czf "${ARCHIVE}" -C dist/providers rosec_gnome_keyring.wasm rosec_gnome_keyring.wasm.minisig
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rosec-wasm-providers
          retention-days: 1
          path: |
            rosec-provider-*.wasm.tar.gz
            rosec-provider-*.wasm.tar.gz.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # SBOM — CycloneDX JSON, generated once (architecture-independent)
  # ---------------------------------------------------------------------------
  build-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [prepare, ci]
    if: needs.prepare.outputs.should_skip != 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libdbus-1-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          # --all generates one .cdx.json per workspace crate; pick the top-level
          # CLI crate (rosec) which transitively covers all dependencies
          cargo cyclonedx --format json --all
          mv rosec/rosec.cdx.json "rosec-${VERSION}.sbom.cdx.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: rosec-sbom
          retention-days: 1
          path: rosec-*.sbom.cdx.json
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Rolling snapshot release — updated on every push to main
  # ---------------------------------------------------------------------------
  snapshot:
    name: Snapshot Release
    runs-on: ubuntu-latest
    needs: [prepare, build, build-wasm, build-sbom]
    if: |
      needs.prepare.outputs.should_skip != 'true' &&
      needs.prepare.outputs.is_release == 'false' &&
      needs.prepare.outputs.is_prerelease == 'false' &&
      github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) \
            -exec cp {} release/ \;
          cat release/*.sha256 > release/checksums.txt
          rm -f release/*.sha256
          ls -lh release/

      - name: Delete existing snapshot release and tag
        run: |
          gh release delete snapshot --yes 2>/dev/null || true
          git push origin :refs/tags/snapshot 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create snapshot release
        uses: softprops/action-gh-release@v2
        with:
          name: "Development Snapshot"
          tag_name: snapshot
          draft: false
          prerelease: true
          body: |
            Automated development snapshot built from `main`.

            **Version:** `${{ needs.prepare.outputs.version }}`
            **Commit:** ${{ github.sha }}
            **Built:** ${{ github.event.head_commit.timestamp }}

            This release is overwritten on every push to `main`. For stable
            builds, use a versioned release tag (`v*`).
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Versioned GitHub release — stable or pre-release, triggered by tag push
  # ---------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [prepare, build, build-wasm, build-sbom]
    if: |
      needs.prepare.outputs.is_release == 'true' ||
      needs.prepare.outputs.is_prerelease == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) \
            -exec cp {} release/ \;
          cat release/*.sha256 > release/checksums.txt
          rm -f release/*.sha256
          ls -lh release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "rosec ${{ needs.prepare.outputs.version_tag }}"
          tag_name: ${{ needs.prepare.outputs.version_tag }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # AUR package update (disabled — enable by removing `if: false`)
  #
  # Requires:
  #   - AUR_SSH_KEY secret: SSH private key with push access to the AUR package
  #   - The AUR package must already be registered
  # ---------------------------------------------------------------------------
  aur-publish:
    name: Publish to AUR
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: needs.prepare.outputs.is_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download x86_64 artifact (for PKGBUILD checksum)
        uses: actions/download-artifact@v4
        with:
          name: rosec-x86_64-unknown-linux-gnu
          path: artifacts

      - name: Compute checksums for PKGBUILD
        id: checksums
        run: |
          X86_64_SHA=$(awk '{print $1}' artifacts/rosec-*-x86_64-unknown-linux-gnu.tar.gz.sha256)
          echo "x86_64_sha=${X86_64_SHA}" >> "$GITHUB_OUTPUT"

      - name: Render PKGBUILD from template
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed \
            -e "s|@VERSION@|${VERSION}|g" \
            -e "s|@X86_64_SHA256@|${{ steps.checksums.outputs.x86_64_sha }}|g" \
            contrib/aur/PKGBUILD-bin > "$GITHUB_WORKSPACE/PKGBUILD-rendered"

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: rosec-bin
          pkgbuild: ${{ github.workspace }}/PKGBUILD-rendered
          assets: contrib/aur/rosec.install
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to ${{ needs.prepare.outputs.version }}"
          force_push: true

  # ---------------------------------------------------------------------------
  # AUR provider -bin packages
  #
  # Each WASM provider gets its own AUR package. The PKGBUILD templates use
  # @VERSION@ and @WASM_SHA256@ placeholders rendered from the release.
  # ---------------------------------------------------------------------------
  aur-publish-providers:
    name: Publish provider -bin to AUR
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: needs.prepare.outputs.is_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: bitwarden-pm
            pkgbuild: contrib/aur/PKGBUILD-provider-bitwarden-pm-bin
            aur_name: rosec-provider-bitwarden-pm-bin
          - provider: bitwarden-sm
            pkgbuild: contrib/aur/PKGBUILD-provider-bitwarden-sm-bin
            aur_name: rosec-provider-bitwarden-sm-bin
          - provider: gnome-keyring
            pkgbuild: contrib/aur/PKGBUILD-provider-gnome-keyring-bin
            aur_name: rosec-provider-gnome-keyring-bin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download WASM provider artifacts
        uses: actions/download-artifact@v4
        with:
          name: rosec-wasm-providers
          path: artifacts

      - name: Compute WASM checksum
        id: checksums
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARCHIVE="artifacts/rosec-provider-${{ matrix.provider }}-${VERSION}.wasm.tar.gz"
          WASM_SHA=$(sha256sum "${ARCHIVE}" | awk '{print $1}')
          echo "wasm_sha=${WASM_SHA}" >> "$GITHUB_OUTPUT"

      - name: Render PKGBUILD from template
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed \
            -e "s|@VERSION@|${VERSION}|g" \
            -e "s|@WASM_SHA256@|${{ steps.checksums.outputs.wasm_sha }}|g" \
            ${{ matrix.pkgbuild }} > "$GITHUB_WORKSPACE/PKGBUILD-rendered"

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: ${{ matrix.aur_name }}
          pkgbuild: ${{ github.workspace }}/PKGBUILD-rendered
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to ${{ needs.prepare.outputs.version }}"
          force_push: true

  # ---------------------------------------------------------------------------
  # AUR rosec-git (VCS source package)
  #
  # Pushes the -git PKGBUILD on each release so the AUR package stays
  # discoverable. Users build from source via makepkg; pkgver() derives the
  # version from git describe at build time. All WASM providers are bundled
  # in the single rosec-git package (no split packages).
  # ---------------------------------------------------------------------------
  aur-publish-git:
    name: Publish rosec-git to AUR
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: needs.prepare.outputs.is_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Render PKGBUILD from template
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed \
            -e "s|@VERSION@|${VERSION}|g" \
            contrib/aur/PKGBUILD-git > "$GITHUB_WORKSPACE/PKGBUILD-git-rendered"

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: rosec-git
          pkgbuild: ${{ github.workspace }}/PKGBUILD-git-rendered
          assets: contrib/aur/rosec.install
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to ${{ needs.prepare.outputs.version }}"
          force_push: true
